<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="peak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- fond -->
  <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- montagnes -->
  <path d="M4 50 L24 18 L36 36 L44 26 L60 50 Z" fill="url(#peak)"/>
  <!-- neige du sommet -->
  <path d="M24 18 L18.5 27 L24 25 L29 30 Z" fill="#e2e8f0"/>

  <!-- trace de piste qui serpente -->
  <path d="M16 51 C 26 48, 22 40, 31 39 C 40 38, 35 31, 44 30"
        fill="none" stroke="#f97316" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- point de départ -->
  <circle cx="44" cy="30" r="4.4" fill="#f97316"/>
  <circle cx="44" cy="30" r="1.7" fill="#fff7ed"/>
</svg>
