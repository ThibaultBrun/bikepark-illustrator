<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Bikepark Illustrator — Outil gratuit pour dessiner et illustrer un bikepark en ligne</title>
    <meta
      name="description"
      content="Outil 100% gratuit, sans inscription ni installation, pour dessiner et illustrer un bikepark : importez vos traces GPX, stylisez les pistes par couleur et difficulté, ajoutez des symboles (remontées, parkings, départs) sur un fond satellite ou OSM avec relief 3D. Tout se passe dans le navigateur."
    />
    <meta
      name="keywords"
      content="dessiner un bikepark, illustrer un bikepark, créer une carte de bikepark, plan de bikepark, outil traces GPX, carte VTT, pistes VTT, bike park map, relief 3D"
    />
    <meta name="author" content="Thibault Brun" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#020617" />
    <link rel="canonical" href="https://bikepark.tbrun.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bikepark Illustrator" />
    <meta property="og:title" content="Bikepark Illustrator — Outil gratuit pour dessiner votre bikepark en ligne" />
    <meta
      property="og:description"
      content="100% gratuit, sans inscription ni installation. Importez vos GPX, stylisez vos pistes par difficulté, ajoutez des symboles sur un fond satellite avec relief 3D — directement dans le navigateur."
    />
    <meta property="og:url" content="https://bikepark.tbrun.dev/" />
    <meta property="og:image" content="https://bikepark.tbrun.dev/og.png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bikepark Illustrator — Outil gratuit pour dessiner votre bikepark en ligne" />
    <meta
      name="twitter:description"
      content="100% gratuit, sans inscription ni installation. GPX stylisés, symboles, fond satellite et relief 3D, directement dans le navigateur."
    />
    <meta name="twitter:image" content="https://bikepark.tbrun.dev/og.png" />

    <!-- Données structurées -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Bikepark Illustrator",
        "url": "https://bikepark.tbrun.dev/",
        "description": "Outil web gratuit pour dessiner et illustrer un bikepark : traces GPX stylisées, symboles, fond satellite ou OSM et relief 3D, directement dans le navigateur.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "inLanguage": "fr",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <!-- Contenu de repli affiché tant que l'app n'est pas chargée (et pour les robots sans JS) -->
      <noscript>
        <h1>Bikepark Illustrator — outil gratuit pour dessiner et illustrer un bikepark en ligne</h1>
        <p>
          Bikepark Illustrator est un outil web <strong>100% gratuit</strong> (sans inscription
          ni installation) pour créer le visuel d'un bikepark :
          importez vos traces GPX, choisissez la couleur et le style de chaque piste,
          ajoutez des symboles (remontées, parkings, départs) sur un fond satellite ou
          OpenStreetMap avec relief 3D. Tout se passe dans le navigateur, sans installation.
          Activez JavaScript pour lancer l'application.
        </p>
      </noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
